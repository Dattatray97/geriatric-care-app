  api-key: pdAeyBYgO3HRTvU9cqV1bDMo2jmP7a0EKZNW4ulCfGzw8Jh5FrPglw26hJHIaGTXBsMc5RKoeOzVxmY3
  enabled: true

# Logging
logging:
  level:
    com.geriatriccare: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Custom app properties
app:
  name: "Elderly Care Smart City Application"
  version: "1.0.0"
  description: "Comprehensive healthcare platform for elderly citizens"
  
  # Emergency settings
  emergency:
    auto-contact-delay: 30
    location-sharing: true
    alert-cooldown: 60
  
  # Voice command settings
  voice:
    enabled: true
    language: "en-US"
    timeout: 10
  
  # Health monitoring
  health:
    check-interval: 300
    alert-threshold:
      heart-rate-min: 50
      heart-rate-max: 120
      blood-pressure-systolic-min: 90
      blood-pressure-systolic-max: 180
      blood-pressure-diastolic-min: 60
      blood-pressure-diastolic-max: 120
  
  # Food service
  food:
    max-delivery-distance: 5
    default-delivery-fee: 2.99
    estimated-preparation-time: 30
  
  # Pharmacy settings
  pharmacy:
    auto-refill-enabled: true
    reminder-advance-time: 15
    drug-interaction-check: true