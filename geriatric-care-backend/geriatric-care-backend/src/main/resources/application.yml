server:
  port: 8088
  servlet:
    context-path: /

spring:
  application:
    name: geriatric-care-app
  
  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/geriatric_care_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # WebSocket / SockJS
  web:
    resources:
      static-locations: classpath:/static/

  # Email SMTP Configuration - Caretaker Gmail acts as Hospital Email
  # Put the Caretaker Gmail address and Gmail App Password below
  # This email will be used as the Hospital Email to send emergency notifications
  mail:
    host: smtp.gmail.com
    port: 587
    username: datta.24.024@gmail.com
    password: "gont caov weyn nxzw"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Hospital email display name shown in recipient inbox
